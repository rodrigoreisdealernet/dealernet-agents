# Phase 2 nonprod namespaces for the dia rental-ERP app.
# Apply with: kubectl apply -f deploy/k8s/namespaces.yaml
#
# These are dedicated namespaces — do NOT reuse other projects' pre-existing
# `dev`/`test`/`prod` namespaces (see docs/specs/live-cluster-deploy-smoke-rollback.md).
apiVersion: v1
kind: Namespace
metadata:
  name: dia-dev
  labels:
    app.kubernetes.io/part-of: dia-rental-erp
    dia.factory/environment: dev
---
apiVersion: v1
kind: Namespace
metadata:
  name: dia-test
  labels:
    app.kubernetes.io/part-of: dia-rental-erp
    dia.factory/environment: test
---
apiVersion: v1
kind: Namespace
metadata:
  name: dia-observability
  labels:
    app.kubernetes.io/part-of: dia-rental-erp
    dia.factory/environment: shared
