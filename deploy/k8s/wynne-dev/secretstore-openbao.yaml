# ESO SecretStore for wynne-dev → dev-grade OpenBao (ADR-0100).
# Bootstrapped by a cluster admin (the namespace-scoped gha-deployer does not manage it).
# Apply with: kubectl apply -f deploy/k8s/wynne-dev/secretstore-openbao.yaml
#
# Prereqs: External Secrets Operator installed cluster-wide, and OpenBao bootstrapped
# per deploy/k8s/wynne-vault/openbao-dev.yaml (Kubernetes auth role `wynne-eso` bound to
# the eso-vault-auth ServiceAccount below).
---
# ServiceAccount ESO authenticates AS to OpenBao (bound to the wynne-eso role).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-vault-auth
  namespace: wynne-dev
  labels:
    app.kubernetes.io/part-of: wynne
---
# Namespaced SecretStore (fits the namespace-scoped gha-deployer). ESO vault provider
# talks to dev-grade OpenBao over HTTP (no TLS in dev). API: external-secrets.io/v1
# (ESO v2.x no longer serves v1beta1).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: openbao-dev
  namespace: wynne-dev
  labels:
    app.kubernetes.io/part-of: wynne
spec:
  provider:
    vault:
      server: "http://openbao.wynne-vault.svc:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "wynne-eso"
          serviceAccountRef:
            name: "eso-vault-auth"
