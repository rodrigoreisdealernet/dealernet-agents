# Per-environment SecretStore template for the PRODUCTION (TLS) OpenBao (ADR-0040).
# Copy to deploy/k8s/<ns>/secretstore-openbao.yaml and replace <ns>/<env>.
# Differs from the dev store (PR #856) by using https + a caProvider for the OpenBao CA.
#
# Prereq: distribute the OpenBao CA (the `ca.crt` from secret openbao-ca) into a secret
# named `openbao-ca` in <ns>, and bind an OpenBao kubernetes-auth role to the SA below.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-vault-auth
  namespace: <ns>
  labels:
    app.kubernetes.io/part-of: dia
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: openbao-<env>
  namespace: <ns>
  labels:
    app.kubernetes.io/part-of: dia
spec:
  provider:
    vault:
      server: "https://openbao.dia-vault.svc:8200"   # TLS in prod
      path: "secret"
      version: "v2"
      caProvider:
        type: Secret
        name: openbao-ca
        key: ca.crt
        namespace: <ns>
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "dia-<env>"            # least-privilege role: read secret/data/dia/<env>/*
          serviceAccountRef:
            name: "eso-vault-auth"
