                - generic [ref=e1190]: Canceling unintentional or unsuccessful Usage (advance)
              - paragraph [ref=e1193]:
                - generic [ref=e1195]: The
                - generic [ref=e1198]: aflo.cancel_previous_resource_event flag
                - generic [ref=e1200]: ", as described earlier, is used for"
                - strong [ref=e1204]: dynamically canceling usage events
                - generic [ref=e1206]: ". This mechanism can target events such as:"
                - strong [ref=e1210]: start
