                - strong [ref=e1216]: ", stop"
                - generic [ref=e1218]: using a resource
                - strong [ref=e1222]: ","
                - generic [ref=e1224]: or an
                - strong [ref=e1228]: update
                - generic [ref=e1230]: to the usage rate
                - strong [ref=e1234]: .
              - paragraph [ref=e1237]:
                - generic [ref=e1239]: For
                - strong [ref=e1243]: Max
                - generic [ref=e1245]: or
                - strong [ref=e1249]: Total Duration meters
                - generic [ref=e1251]: ", Amberflo supports an additional flag to refine cancellation behavior:"
                - generic [ref=e1254]: "\"aflo.ignore_cancellation_if_no_usage\""
                - generic [ref=e1256]: This secondary flag is only meaningful when used together with
                - generic [ref=e1259]: aflo.cancel_previous_resource_event
                - generic [ref=e1261]: ". If aflo.ignore_cancellation_if_no_usage is set to true, Amberflo will: ignore the cancellation of a \"stop\" event if there was"
                - strong [ref=e1265]: no usage
                - generic [ref=e1267]: recorded between the original start and stop events.
