              - paragraph [ref=e1011]:
                - generic [ref=e1013]: 📘
                - strong [ref=e1017]
                - strong [ref=e1023]: Limitations
              - paragraph [ref=e1026]:
                - generic [ref=e1028]: When canceling events using
                - strong [ref=e1032]: resource-related properties
                - generic [ref=e1034]: "and the aflo.cancel_previous_resource_event flag, there are a few important constraints to keep in mind:"
              - paragraph [ref=e1037]:
                - strong [ref=e1041]: 1. 9-Hour Time Limit
              - paragraph [ref=e1044]:
                - generic [ref=e1046]: You have up to
                - strong [ref=e1050]: 9 hours from the time a resource starts being used
                - generic [ref=e1052]: to cancel the associated usage event.
              - paragraph [ref=e1055]:
                - strong [ref=e1059]: 2. Timestamp of the Cancellation Event
              - list [ref=e1063]:
                - listitem [ref=e1064]:
                  - generic [ref=e1066]: The
                  - strong [ref=e1070]: timestamp of the cancellation event
                  - generic [ref=e1072]: must be
                  - strong [ref=e1076]: no later than 9 hours after
                  - generic [ref=e1078]: the original usage event.
              - list [ref=e1082]:
                - listitem [ref=e1083]:
                  - generic [ref=e1085]: "For best results, set the cancellation event’s timestamp to be:"
              - list [ref=e1089]:
                - listitem [ref=e1090]:
                  - generic [ref=e1092]: As
                  - strong [ref=e1096]: close as possible
                  - generic [ref=e1098]: to the original event
              - list [ref=e1102]:
                - listitem [ref=e1103]:
                  - generic [ref=e1105]: Or even use the
                  - strong [ref=e1109]: exact same timestamp
                  - generic [ref=e1111]: as the event you are canceling
              - paragraph [ref=e1114]:
                - strong [ref=e1118]: Why These Limitations Exist
                - strong [ref=e1124]: "?"
              - paragraph [ref=e1127]:
                - generic [ref=e1129]: When you define a cancellation event using only
                - strong [ref=e1133]: resource-related properties
                - generic [ref=e1135]: ", you're not explicitly identifying the exact meter event to be canceled (e.g., by unique ID)."
              - paragraph [ref=e1138]:
                - generic [ref=e1140]: Because of this, Amberflo operates under the assumption that you're targeting a
                - strong [ref=e1144]: recent event
                - generic [ref=e1146]: "and will:"
              - list [ref=e1150]:
                - listitem [ref=e1151]:
                  - generic [ref=e1153]: Search for the
                  - strong [ref=e1157]: most recent event
                  - generic [ref=e1159]: related to the specified resource within the last 9 hours
              - list [ref=e1163]:
                - listitem [ref=e1164]:
                  - generic [ref=e1166]: Cancel that event
                  - strong [ref=e1170]: if it exists
              - paragraph [ref=e1173]:
                - strong [ref=e1177]: "Important:"
                - generic [ref=e1179]: If the same resource was used more than once in that time window, Amberflo will cancel only the most recent of those events.
              - paragraph [ref=e1182]:
                - generic [ref=e1184]: Also note that the value of the cancellation event does not matter, because its only purpose is to signal the system to drop the matching usage record—not to report usage.
              - heading "Canceling unintentional or unsuccessful Usage (advance)Canceling unintentional or unsuccessful Usage (advance)" [level=2] [ref=e1188] [cursor=pointer]:
