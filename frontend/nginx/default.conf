server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /runtime-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    expires -1;
    default_type application/javascript;
    alias /tmp/runtime-config.js;
  }

  # Proxy /api/* to the ops-api service so browser requests reach the in-cluster
  # backend. OPS_API_URL is substituted at container start by entrypoint.sh via
  # envsubst; the path (including /api/ prefix) is forwarded unchanged so the
  # FastAPI app receives its full route (e.g. /api/ops/findings/decision).
  location /api/ {
    proxy_pass ${OPS_API_URL};
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
