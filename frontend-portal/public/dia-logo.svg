<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 64" width="256" height="64" role="img" aria-label="DIA — Dealernet Intelligence Agents">
  <title>DIA — Dealernet Intelligence Agents</title>
  <desc>Marca do portal DIA: constelação de agentes em torno de um hub central, com a sigla DIA e a assinatura Dealernet Intelligence Agents.</desc>
  <defs>
    <!-- Gradiente da marca: azul interativo → navy do wordmark Dealernet. -->
    <linearGradient id="dia-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a4da6"/>
      <stop offset="1" stop-color="#15375f"/>
    </linearGradient>
    <!-- Brilho superior sutil: dá profundidade sem usar sombra. -->
    <linearGradient id="dia-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Marca: cápsula com a constelação de agentes (hub + nós conectados). -->
  <g>
    <rect x="2" y="6" width="52" height="52" rx="14" fill="url(#dia-mark)"/>
    <rect x="2" y="6" width="52" height="52" rx="14" fill="url(#dia-sheen)"/>

    <!-- Conexões: spokes do hub até cada agente + a malha entre eles. -->
    <g stroke="#ffffff" stroke-linecap="round" fill="none">
      <g stroke-opacity="0.32" stroke-width="1.4">
        <path d="M28 18 L17 40"/>
        <path d="M28 18 L40 40"/>
        <path d="M17 40 L40 40"/>
      </g>
      <g stroke-opacity="0.85" stroke-width="1.6">
        <path d="M28 32 L28 18"/>
        <path d="M28 32 L17 40"/>
        <path d="M28 32 L40 40"/>
      </g>
    </g>

    <!-- Agentes: nós claros + um nó em destaque no vermelho Dealernet. -->
    <circle cx="28" cy="18" r="4" fill="#ffffff"/>
    <circle cx="17" cy="40" r="4" fill="#ffffff"/>
    <circle cx="40" cy="40" r="4.6" fill="#f04438"/>
    <!-- Hub orquestrador no centro. -->
    <circle cx="28" cy="32" r="5.4" fill="#ffffff"/>
    <circle cx="28" cy="32" r="2.4" fill="#15375f"/>
  </g>

  <!-- Wordmark + assinatura. -->
  <g font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
    <text x="70" y="34" font-size="23" font-weight="700" letter-spacing="0.5" fill="#15375f">DIA</text>
    <text x="71" y="48" font-size="9.5" font-weight="500" letter-spacing="0.2" fill="#0a4da6">Dealernet Intelligence Agents</text>
  </g>
</svg>
