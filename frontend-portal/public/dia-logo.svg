<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="DIA — Dealernet Intelligence Agents" width="240" height="64">
  <title>DIA — Dealernet Intelligence Agents</title>
  <defs>
    <linearGradient id="dia-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a4da6"/>
      <stop offset="1" stop-color="#15375f"/>
    </linearGradient>
  </defs>

  <!-- Marca: cápsula com a sigla DIA -->
  <g>
    <rect x="0" y="8" width="58" height="48" rx="12" fill="url(#dia-mark)"/>
    <!-- ponto/acento da marca Dealernet -->
    <circle cx="46.5" cy="18.5" r="3.5" fill="#d32b26"/>
    <text x="29" y="40.5" text-anchor="middle"
          font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif"
          font-size="22" font-weight="700" letter-spacing="0.5" fill="#ffffff">DIA</text>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
    <text x="72" y="30" font-size="20" font-weight="700" fill="#15375f" letter-spacing="0.5">DIA</text>
    <text x="72" y="46" font-size="10.5" font-weight="500" fill="#0a4da6" letter-spacing="0.2">Dealernet Intelligence Agents</text>
  </g>
</svg>
