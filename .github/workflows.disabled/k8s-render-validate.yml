name: K8s Render & Validate

# Phase 2 (#46): render-only validation of the Helm chart + k8s manifests.
# Contacts NO live cluster — pure CI. Runs the chart's lint/template suite for
# every env profile and schema-validates rendered output + bootstrap manifests.

on:
  pull_request:
    paths:
      - 'charts/**'
      - 'deploy/k8s/**'
      - 'deploy/openbao/**'
      - '.github/workflows/k8s-render-validate.yml'
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - 'deploy/k8s/**'
      - 'deploy/openbao/**'

permissions:
  contents: read

jobs:
  render-validate:
    name: Render & schema-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.3

      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/

      - name: "Helm lint + template (app chart: base/dev/test/prod)"
        run: bash charts/app/ci-test.sh

      - name: Ensure observability Helm repo is configured
        run: |
          set -euo pipefail
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts >/dev/null 2>&1 || true
          helm repo update >/dev/null

      - name: "Helm lint + template (observability chart: base/dev/test/prod)"
        run: bash charts/observability/ci-test.sh

      - name: Schema-validate rendered chart per profile
        run: |
          set -euo pipefail
          for profile in values.yaml values-dev.yaml values-test.yaml values-prod.yaml; do
            echo "::group::kubeconform (app) — $profile"
            helm template rental-app charts/app -f "charts/app/$profile" \
              | kubeconform -strict -summary -ignore-missing-schemas
            echo "::endgroup::"
          done

          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts >/dev/null 2>&1 || true
          helm repo update >/dev/null
          helm dependency build charts/observability >/dev/null
          for profile in values.yaml values-dev.yaml values-test.yaml values-prod.yaml; do
            echo "::group::kubeconform (observability) — $profile"
            helm template dia-observability charts/observability -f "charts/observability/$profile" \
              | kubeconform -strict -summary -ignore-missing-schemas
            echo "::endgroup::"
          done

      - name: Schema-validate bootstrap manifests
        run: |
          set -euo pipefail
          if compgen -G "deploy/k8s/*.yaml" > /dev/null; then
            kubeconform -strict -summary -ignore-missing-schemas deploy/k8s/*.yaml
          else
            echo "No deploy/k8s manifests to validate."
          fi

      - name: Schema-validate OpenBao manifests (ADR-0040)
        run: |
          set -euo pipefail
          echo "::group::kubeconform (OpenBao standalone manifests)"
          if compgen -G "deploy/openbao/*.yaml" > /dev/null; then
            # Exclude templates and Helm values files (not K8s manifests)
            for manifest in deploy/openbao/*.yaml; do
              basename="$(basename "$manifest")"
              if [[ "$basename" != *"template"* && "$basename" != "values-"* ]]; then
                kubeconform -strict -summary -ignore-missing-schemas "$manifest"
              fi
            done
          else
            echo "No deploy/openbao manifests to validate."
          fi
          echo "::endgroup::"

      - name: Validate OpenBao deploy surface (ADR-0040)
        run: bash deploy/openbao/ci-test.sh

      - name: Summary
        if: always()
        run: echo "## K8s render & validate complete (chart + manifests + OpenBao, render-only — no cluster contact)" >> "$GITHUB_STEP_SUMMARY"
