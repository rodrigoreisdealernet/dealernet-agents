name: Deploy Test

# Phase 2 (#41/#44): promote a previously-built set of images to the `wynne-test`
# namespace.  Triggered manually by a release manager once dev smoke passes.
#
# GATED: until Phase 2 is enabled the deploy job is skipped cleanly.  To enable,
# set K8S_DEPLOY_ENABLED=true, WYNNE_TEST_NAMESPACE, and the KUBE_CONFIG_TEST
# secret.  See docs/specs/live-cluster-deploy-smoke-rollback.md.
#
# Promotion carries the SAME immutable image digest that build-images.yml pushed
# (ADR-0010).  PREFERRED: pass `sha` = a KNOWN-GOOD commit (from the releases-ledger
# branch) and the digest is resolved from ACR by its :<sha> tag — works for any past
# build (ADR-0062).  LEGACY: pass `build_run_id` to use that run's ≤90d digest
# artifacts.  Exactly one is required; a missing/unresolvable digest is a hard failure.
#
# NOTE: per spec, the helm/kubectl step should eventually move to the
# `factory-deploy-nonprod` self-hosted runner once that runner is provisioned.

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'PREFERRED: commit SHA of a KNOWN-GOOD build to promote (see the releases-ledger branch / latest-known-good.txt). Resolves the immutable digest from ACR — works for any past build. Leave blank only to use the legacy build_run_id path.'
        required: false
        type: string
      build_run_id:
        description: 'LEGACY fallback: Run ID of a Build Images run whose digest artifacts (≤90d) to promote. Ignored when sha is set.'
        required: false
        type: string
      sha_tag:
        description: 'Commit SHA for audit display (optional; defaults to the promoted sha, else "build-<run_id>")'
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-test
  cancel-in-progress: false   # Never silently discard a test promotion

jobs:
  preflight:
    name: Preflight (gate)
    runs-on: ubuntu-latest
    outputs:
      app_enabled: ${{ steps.gate.outputs.app_enabled }}
    steps:
      - id: gate
        env:
          DEPLOY_ENABLED: ${{ vars.K8S_DEPLOY_ENABLED }}
          TEST_NAMESPACE: ${{ vars.WYNNE_TEST_NAMESPACE }}
          HAS_DEPLOY_KUBECONFIG: ${{ secrets.KUBE_CONFIG_TEST != '' }}
          GATE_CONFIRMED: ${{ vars.WYNNE_TEST_GATE_CONFIRMED }}
        run: |
          APP_ENABLED=false
          if [[ "$DEPLOY_ENABLED" == "true" && -n "$TEST_NAMESPACE" && "$HAS_DEPLOY_KUBECONFIG" == "true" ]]; then
            # Hard-fail if the human gate (GitHub Environment + required reviewers) has not
            # been explicitly confirmed as configured (ADR-0062). The 'test' GitHub Environment
            # must exist with required reviewers BEFORE setting WYNNE_TEST_GATE_CONFIRMED=true.
            # See docs/runbooks/promotion.md — "One-time setup (required for the human gates)".
            if [[ "$GATE_CONFIRMED" != "true" ]]; then
              echo "::error::WYNNE_TEST_GATE_CONFIRMED is not set to 'true'. Create the 'test' GitHub Environment with required reviewers first, then set this variable. See docs/runbooks/promotion.md." >&2
              exit 1
            fi
            APP_ENABLED=true
          fi
          echo "app_enabled=$APP_ENABLED" >> "$GITHUB_OUTPUT"
          {
            echo "## Deploy Test preflight"
            echo ""
            echo "| Gate | Status |"
            echo "|------|--------|"
            if [ "$APP_ENABLED" = true ]; then
              echo "| App deploy (frontend + worker) | ✅ enabled → \`$TEST_NAMESPACE\` |"
            else
              echo "| App deploy (frontend + worker) | ⏭️ skipped — needs K8S_DEPLOY_ENABLED + WYNNE_TEST_NAMESPACE + KUBE_CONFIG_TEST |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy app to wynne-test
    needs: preflight
    if: needs.preflight.outputs.app_enabled == 'true'
    runs-on: ubuntu-latest   # TODO: move to factory-deploy-nonprod per spec once provisioned
    environment: test
    env:
      TEST_NAMESPACE: ${{ vars.WYNNE_TEST_NAMESPACE }}
      OBSERVABILITY_NAMESPACE: wynne-observability
      IMAGE_REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}
    steps:
      - uses: actions/checkout@v4

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.3

      - name: Configure kubeconfig (namespace-scoped gha-deployer)
        run: |
          install -m 600 /dev/null "$RUNNER_TEMP/kubeconfig"
          echo "${{ secrets.KUBE_CONFIG_TEST }}" > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      # ── Resolve image digests (ADR-0062) ──────────────────────────────────────
      # PREFERRED promote-by-SHA: resolve the immutable digest from ACR by the
      # commit-SHA tag (works for ANY past known-good build). LEGACY build_run_id:
      # download the ≤90d digest artifacts. Exactly one path runs.
      - name: Validate promotion inputs
        env:
          SHA: ${{ inputs.sha }}
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
        run: |
          set -euo pipefail
          if [[ -z "$SHA" && -z "$BUILD_RUN_ID" ]]; then
            echo "::error::provide either 'sha' (preferred, a known-good commit from releases-ledger) or 'build_run_id' (legacy)." >&2
            exit 1
          fi
          [[ -n "$SHA" && -n "$BUILD_RUN_ID" ]] && echo "::notice::both given — using 'sha' (promote-by-digest from ACR)."

      - name: Log in to ACR (promote-by-SHA path)
        if: ${{ inputs.sha != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Resolve digests from ACR by SHA
        if: ${{ inputs.sha != '' }}
        id: acr
        env:
          REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}
          SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          echo "frontend=$(bash .github/scripts/resolve-image-digest.sh frontend "$SHA")" >> "$GITHUB_OUTPUT"
          echo "worker=$(bash .github/scripts/resolve-image-digest.sh temporal-worker "$SHA")" >> "$GITHUB_OUTPUT"

      - name: Download image digests from Build Images run (legacy path)
        if: ${{ inputs.sha == '' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.build_run_id }}
          pattern: image-digest-*
          path: /tmp/digests/
          merge-multiple: false

      - name: Resolve digests from artifacts (legacy path)
        if: ${{ inputs.sha == '' }}
        id: artifact
        run: |
          set -euo pipefail
          FRONTEND_DIGEST=""; WORKER_DIGEST=""
          [[ -f /tmp/digests/image-digest-frontend/digest.txt ]] && FRONTEND_DIGEST=$(tr -d '[:space:]' < /tmp/digests/image-digest-frontend/digest.txt)
          [[ -f /tmp/digests/image-digest-temporal-worker/digest.txt ]] && WORKER_DIGEST=$(tr -d '[:space:]' < /tmp/digests/image-digest-temporal-worker/digest.txt)
          if [[ -z "${FRONTEND_DIGEST}" || -z "${WORKER_DIGEST}" ]]; then
            echo "::error::digest artifacts missing/expired for build run ${{ inputs.build_run_id }} (>90d?). Use the 'sha' path to resolve from ACR instead. ADR-0010/0062." >&2
            exit 1
          fi
          echo "frontend=${FRONTEND_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "worker=${WORKER_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Select digests + audit tag
        id: digests
        env:
          ACR_FE: ${{ steps.acr.outputs.frontend }}
          ACR_WK: ${{ steps.acr.outputs.worker }}
          ART_FE: ${{ steps.artifact.outputs.frontend }}
          ART_WK: ${{ steps.artifact.outputs.worker }}
          SHA: ${{ inputs.sha }}
          SHA_TAG: ${{ inputs.sha_tag }}
          BUILD_RUN_ID: ${{ inputs.build_run_id }}
        run: |
          set -euo pipefail
          FE="${ACR_FE:-$ART_FE}"; WK="${ACR_WK:-$ART_WK}"
          if [[ "$FE" != sha256:* || "$WK" != sha256:* ]]; then
            echo "::error::failed to resolve both image digests (frontend='$FE' worker='$WK')." >&2
            exit 1
          fi
          echo "frontend=$FE" >> "$GITHUB_OUTPUT"
          echo "worker=$WK"   >> "$GITHUB_OUTPUT"
          echo "tag=${SHA_TAG:-${SHA:-build-${BUILD_RUN_ID}}}" >> "$GITHUB_OUTPUT"

      - name: Helm upgrade (wynne-test)
        run: |
          set -euo pipefail
          helm upgrade --install rental-app charts/app \
            -f charts/app/values-test.yaml \
            --namespace "$TEST_NAMESPACE" \
            --set "imageRegistry=${IMAGE_REGISTRY}" \
            --set "frontend.image.digest=${{ steps.digests.outputs.frontend }}" \
            --set "frontend.image.tag=${{ steps.digests.outputs.tag }}" \
            --set "temporalWorker.image.digest=${{ steps.digests.outputs.worker }}" \
            --set "temporalWorker.image.tag=${{ steps.digests.outputs.tag }}" \
            --set "opsApi.image.digest=${{ steps.digests.outputs.worker }}" \
            --set "opsApi.image.tag=${{ steps.digests.outputs.tag }}" \
            --wait --timeout 10m

      - name: Prepare observability chart dependencies
        run: |
          set -euo pipefail
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts >/dev/null 2>&1 || true
          helm repo update >/dev/null
          helm dependency build charts/observability >/dev/null

      - name: Helm upgrade observability stack (test profile)
        run: |
          set -euo pipefail
          helm upgrade --install observability charts/observability \
            -f charts/observability/values-test.yaml \
            --namespace "$OBSERVABILITY_NAMESPACE" \
            --create-namespace \
            --wait --timeout 10m

      - name: Deploy summary
        if: always()
        run: |
          {
            echo "## Deploy Test → $TEST_NAMESPACE"
            echo "- build run: ${{ inputs.build_run_id }}"
            echo "- frontend digest: ${{ steps.digests.outputs.frontend }}"
            echo "- worker digest: ${{ steps.digests.outputs.worker }}"
            echo "- tag (audit): ${{ steps.digests.outputs.tag }}"
            echo "- observability release: observability upgraded in $OBSERVABILITY_NAMESPACE (values-test)"
            echo "- next: smoke-dev-test-prod.yml (Phase 2 follow-up)"
          } >> "$GITHUB_STEP_SUMMARY"
