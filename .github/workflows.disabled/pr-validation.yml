        run: bash supabase/tests/run_demo_baseline_seed.sh

      - name: Record seed outcome (trend history)
        if: always()
        run: |
          out=passed
          [ "${{ steps.seed.outcome }}" = "success" ] || out=failed
          printf '{"outcome":"%s"}\n' "$out" > seed-results.json

      - name: Upload seed results (trend history)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: seed-results
          path: seed-results.json
          if-no-files-found: ignore
          retention-days: 7
