name: PR Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-validation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Cancel stale runs on PRs so a new push always advances to the current
  # head SHA instead of queuing behind an older run that can never finish.
  # Push-to-main runs are NOT cancelled (expression evaluates to false for
  # non-PR events), preserving trunk validation coverage.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shared-tools:
    name: Shared tools regression suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: .github/tools/shared/package-lock.json

      - name: Install shared runtime deps
        run: npm ci
        working-directory: .github/tools/shared

      - name: Run shared Vitest regression suite
        run: npm test
        working-directory: .github/tools/shared

  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      # Run the unit suite with the JSON reporter so the result can be charted on the
      # ci-history branch. A red suite MUST fail CI — we no longer swallow failures into
      # a "skipped" message (that hid breakage the same way #57/#58 did for Temporal).
      # We only genuinely skip when there is no `test` script at all (template portability).
      - name: Unit tests (vitest, JSON report for trend history)
        working-directory: frontend
        run: |
          if [ -z "$(node -p "require('./package.json').scripts.test || ''" 2>/dev/null)" ]; then
            echo "## ℹ️ Frontend tests skipped — no test script configured" >> "$GITHUB_STEP_SUMMARY"
          else
            npx vitest run --reporter=default --reporter=json --outputFile=vitest-results.json
          fi

      - name: Upload unit results (trend history)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-results
          path: frontend/vitest-results.json
          if-no-files-found: ignore
          retention-days: 7

  coverage:
    name: Coverage (non-gating)
    # Informational telemetry for the ci-history `coverage` trend (unit code coverage +
    # e2e screens/journeys). NEVER gates: kept out of the gating `frontend` job because
    # coverage instrumentation slows tests enough to tip borderline timeouts. Recorded
    # only on push-to-main (matching publish-test-history), so it doesn't burn PR minutes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Unit coverage (vitest v8 — best-effort, never fails the job)
        working-directory: frontend
        run: npx vitest run --coverage --test-timeout=30000 || true
      - name: Compute coverage (unit + e2e screens/journeys)
        run: |
          node .github/scripts/coverage-compute.mjs \
            --frontend frontend \
            --unit-coverage frontend/coverage/coverage-summary.json \
            > coverage-results.json || echo '{}' > coverage-results.json
          cat coverage-results.json
      - name: Upload coverage results (trend history)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-results
          path: coverage-results.json
          if-no-files-found: ignore
          retention-days: 7

  static-analysis:
    name: Static analysis (report-only)
    # REPORT-ONLY for now — fast PR feedback, never blocks a merge. Each check is
    # continue-on-error and its count is summarised. Promote a check to GATING (own job,
    # no continue-on-error) only once its count is at 0 and stable — see qa-targets.json.
    # The authoritative recorded metric comes from the nightly code-quality.yml run.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript — tsc --noEmit (tsc -b)
        id: tsc
        continue-on-error: true
        working-directory: frontend
        run: |
          npx tsc -b 2>&1 | tee ../tsc.txt || true
          echo "count=$(grep -cE 'error TS[0-9]+' ../tsc.txt || echo 0)" >> "$GITHUB_OUTPUT"

      - name: Ruff (Python lint)
        id: ruff
        continue-on-error: true
        run: |
          pip install ruff==0.8.4 >/dev/null 2>&1 || pipx install ruff==0.8.4 || true
          ruff check temporal --output-format concise 2>&1 | tee ruff.txt || true
          echo "count=$(grep -cE '^[^ ].*:[0-9]+:[0-9]+:' ruff.txt || echo 0)" >> "$GITHUB_OUTPUT"

      - name: ShellCheck (preinstalled on runner)
        id: shellcheck
        continue-on-error: true
        run: |
          mapfile -t files < <(git ls-files '*.sh')
          if [ "${#files[@]}" -gt 0 ]; then
            shellcheck -S warning "${files[@]}" 2>&1 | tee shellcheck.txt || true
          else
            : > shellcheck.txt
          fi
          echo "count=$(grep -cE '^In .* line [0-9]+:' shellcheck.txt || echo 0)" >> "$GITHUB_OUTPUT"

      - name: Hadolint (Dockerfiles)
        id: hadolint
        continue-on-error: true
        run: |
          docker run --rm -i hadolint/hadolint hadolint - < frontend/Dockerfile > hadolint.txt 2>&1 || true
          echo "count=$(grep -cE 'DL[0-9]+|SC[0-9]+' hadolint.txt || echo 0)" >> "$GITHUB_OUTPUT"

      - name: Gitleaks (secret scan — binary, no action license needed)
        id: gitleaks
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --no-banner --report-format json --report-path /repo/gitleaks.json 2>&1 || true
          echo "count=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('gitleaks.json','utf8')).length)}catch{console.log(0)}")" >> "$GITHUB_OUTPUT"

      - name: Summarise (report-only — not a gate)
        if: always()
        run: |
          {
            echo "## Static analysis (report-only — does not block merge)"
            echo "| Check | Findings |"
            echo "|---|--:|"
            echo "| tsc --noEmit | ${{ steps.tsc.outputs.count }} |"
            echo "| ruff | ${{ steps.ruff.outputs.count }} |"
            echo "| shellcheck | ${{ steps.shellcheck.outputs.count }} |"
            echo "| hadolint | ${{ steps.hadolint.outputs.count }} |"
            echo "| gitleaks (secrets) | ${{ steps.gitleaks.outputs.count }} |"
            echo ""
            echo "_Authoritative recorded metric: nightly **Code quality** workflow → \`ci-history\` \`quality\` record._"
          } >> "$GITHUB_STEP_SUMMARY"

  temporal:
    name: Temporal worker tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history to diff the PR against its base for path scoping below.
          fetch-depth: 0

      # Temporal worker tests are only required for Temporal-surface changes.
      # Supabase-only PRs are covered by dedicated reset-path jobs in this workflow;
      # running the full Temporal suite there is duplicate coverage and the longest
      # shared-runner pole.
      - name: Scope reset/smoke validations to DB-surface changes
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base='${{ github.event.pull_request.base.sha }}'
            head='${{ github.event.pull_request.head.sha }}'
            db_surface_pattern='^(supabase/|temporal/tests/|temporal/pyproject\.toml|\.github/workflows/pr-validation\.yml)'
            temporal_surface_pattern='^(temporal/|\.github/workflows/pr-validation\.yml$)'
            # Do NOT suppress errors: if the diff cannot be computed the step must
            # fail loudly rather than silently defaulting to skip_reset=1 and
            # dropping coverage for a DB-touching PR.
            # Use three-dot (merge-base) syntax so only commits introduced by THIS
            # PR are evaluated — not unrelated commits already on main that happen
            # to touch supabase/, temporal/tests/, temporal/pyproject.toml, or
            # .github/workflows/pr-validation.yml.
            changed="$(git diff --name-only "$base...$head")"
            if [ -z "$changed" ]; then
              # For no-delta PRs (this branch introduces no file changes against
              # base), skip the Temporal suite entirely so required checks do not
              # sit in-progress running unchanged coverage.
              echo "skip_reset=0" >> "$GITHUB_OUTPUT"
              echo "skip_temporal_suite=1" >> "$GITHUB_OUTPUT"
              echo "Temporal suite: SKIPPED (PR introduces no file changes)." >> "$GITHUB_STEP_SUMMARY"
            elif printf '%s\n' "$changed" | grep -qE "$temporal_surface_pattern"; then
              echo "skip_temporal_suite=0" >> "$GITHUB_OUTPUT"
              if printf '%s\n' "$changed" | grep -qE "$db_surface_pattern"; then
                echo "skip_reset=0" >> "$GITHUB_OUTPUT"
                echo "Reset/smoke validations: RUN (PR touches supabase/, temporal/tests/, temporal/pyproject.toml, or .github/workflows/pr-validation.yml)." >> "$GITHUB_STEP_SUMMARY"
              else
                echo "skip_reset=1" >> "$GITHUB_OUTPUT"
                echo "Reset/smoke validations: SKIPPED (PR touches temporal code but not supabase/, temporal/tests/, temporal/pyproject.toml, or .github/workflows/pr-validation.yml)." >> "$GITHUB_STEP_SUMMARY"
              fi
            elif printf '%s\n' "$changed" | grep -qE "$db_surface_pattern"; then
              echo "skip_reset=0" >> "$GITHUB_OUTPUT"
              echo "skip_temporal_suite=1" >> "$GITHUB_OUTPUT"
              echo "Temporal suite: SKIPPED (PR touches DB surfaces only; dedicated Supabase reset-path jobs provide coverage)." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "skip_reset=1" >> "$GITHUB_OUTPUT"
              echo "skip_temporal_suite=1" >> "$GITHUB_OUTPUT"
              echo "Temporal suite: SKIPPED (PR touches neither temporal/ nor .github/workflows/pr-validation.yml)." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            # push to main (post-merge trunk validation): always run the full suite.
            echo "skip_reset=0" >> "$GITHUB_OUTPUT"
            echo "skip_temporal_suite=0" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          # Authenticate the "resolve latest release" API call. Without this the
          # action hits the unauthenticated GitHub API limit (60/hr/IP), which
          # shared CI runners exhaust under high PR volume — failing the install
          # with "Failed to resolve latest Supabase CLI release: rate limit
          # exceeded" and reddening main. A token raises the limit to 1000/hr.
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install
        run: pip install -e ".[dev]"
        working-directory: temporal

      - name: Test Temporal suite
        # Skip ONLY when there are genuinely no tests (template portability).
        # When tests exist, a red suite MUST fail CI — the previous
        # `2>/dev/null || skipped` hack hid a broken `main` (see #57/#58).
        # --json-report emits temporal/pytest-report.json for the ci-history trend.
        run: |
          set -euo pipefail
          pytest_timeout_minutes=70
          timeout_budget="${pytest_timeout_minutes}m"
          heartbeat_interval_seconds=120
          log_path="temporal/pytest-output.log"
          diagnostics_path="temporal/pytest-diagnostics.txt"
          heartbeat_path="temporal/pytest-heartbeat.log"

          if [ "${SKIP_TEMPORAL_SUITE:-0}" = "1" ]; then
            echo "## ℹ️ Temporal tests skipped by scope gate" >> "$GITHUB_STEP_SUMMARY"
          elif [ -z "$(find temporal/tests -name 'test_*.py' -print -quit 2>/dev/null)" ]; then
            echo "## ℹ️ Temporal tests skipped — no test files present" >> "$GITHUB_STEP_SUMMARY"
          else
            # Fail fast before the job-level timeout so we can emit diagnostics
            # and upload artifacts instead of leaving a wedged lane with no signal.
            start_epoch="$(date +%s)"
            : > "$heartbeat_path"
            set +e
            timeout --signal=SIGINT --kill-after=60s "$timeout_budget" \
              bash -o pipefail -c '
                python -X faulthandler -m pytest temporal/tests -v \
                  --json-report --json-report-file=temporal/pytest-report.json \
                  2>&1 | tee "$1"
              ' _ "$log_path" &
            pytest_pid=$!

            (
              while kill -0 "$pytest_pid" >/dev/null 2>&1; do
                now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                elapsed="$(( $(date +%s) - start_epoch ))"
                echo "[${now}] Temporal suite in progress (elapsed ${elapsed}s / timeout ${pytest_timeout_minutes}m)." | tee -a "$heartbeat_path"
                sleep "$heartbeat_interval_seconds"
              done
            ) &
            heartbeat_pid=$!

            wait "$pytest_pid"
            status=$?
            kill "$heartbeat_pid" >/dev/null 2>&1 || true
            wait "$heartbeat_pid" 2>/dev/null || true
            set -e
            if [ "$status" -eq 0 ]; then
              :
            else
              {
                echo "Temporal pytest exit status: $status"
                echo "UTC timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                echo
                echo "==== docker ps -a ===="
                docker ps -a || true
                echo
                echo "==== docker stats --no-stream ===="
                docker stats --no-stream || true
                echo
                echo "==== ps (python/pytest/supabase/docker) ===="
                ps -eo pid,ppid,etimes,pcpu,pmem,command | grep -E 'python|pytest|supabase|docker' | grep -v grep || true
                echo
                echo "==== tail: temporal/pytest-output.log ===="
                tail -n 200 "$log_path" || true
                echo
                echo "==== tail: temporal/pytest-heartbeat.log ===="
                tail -n 200 "$heartbeat_path" || true
              } > "$diagnostics_path"

              # GNU timeout returns exit code 124 when the command times out.
              if [ "$status" -eq 124 ]; then
                echo "## ❌ Temporal test suite timed out after ${pytest_timeout_minutes} minutes (fail-fast guard)." >> "$GITHUB_STEP_SUMMARY"
              else
                echo "## ❌ Temporal test suite failed (exit status $status)." >> "$GITHUB_STEP_SUMMARY"
              fi
              echo "Saved diagnostics: $diagnostics_path" >> "$GITHUB_STEP_SUMMARY"
              exit "$status"
            fi
          fi
        env:
          REQUIRE_SUPABASE_RESET_VALIDATION: '1'
          # When the PR touches neither supabase/ nor temporal/tests/ nor
          # temporal/pyproject.toml nor .github/workflows/pr-validation.yml, the
          # conftest collection hook deselects the heavy reset/smoke validations.
          SKIP_SUPABASE_RESET_VALIDATION: ${{ steps.scope.outputs.skip_reset }}
          SKIP_TEMPORAL_SUITE: ${{ steps.scope.outputs.skip_temporal_suite }}

      - name: Upload temporal results (trend history)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: temporal-results
          path: |
            temporal/pytest-report.json
            temporal/pytest-output.log
            temporal/pytest-heartbeat.log
            temporal/pytest-diagnostics.txt
          if-no-files-found: ignore
          retention-days: 7

  helm-charts:
    name: Helm chart lint & profile tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Validate mirrored Temporal UI image in ACR
        env:
          REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}
          REGISTRY_USERNAME: ${{ secrets.ACR_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: bash ./.github/scripts/temporal-ui-image.sh validate

      - uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Lint and render app chart profiles
        env:
          # Tells ci-test.sh to drop a machine-readable summary for the ci-history trend.
          CI_HISTORY_JSON: ${{ github.workspace }}/helm-results.json
        run: bash charts/app/ci-test.sh

      - name: Lint and render monitoring chart profiles
        run: bash charts/monitoring/ci-test.sh

      - name: Lint and render observability chart profiles
        run: bash charts/observability/ci-test.sh

      - name: Validate OpenBao deploy surface (ADR-0040)
        run: bash deploy/openbao/ci-test.sh

      - name: Frontend entrypoint runtime-contract tests
        run: bash frontend/docker/test-entrypoint.sh

      - name: Upload helm results (trend history)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: helm-results
          path: helm-results.json
          if-no-files-found: ignore
          retention-days: 7

