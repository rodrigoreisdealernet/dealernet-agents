  supabase-quote-conversion-gate-reset:
    name: Supabase quote-gate conversion ACL + status-gate reset-path validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history to diff the PR against its base for path scoping below.
          fetch-depth: 0

      - name: Scope reset validation to DB-surface changes
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base='${{ github.event.pull_request.base.sha }}'
            head='${{ github.event.pull_request.head.sha }}'
            changed="$(git diff --name-only "$base...$head")"
            if [ -z "$changed" ]; then
              echo "skip_reset=0" >> "$GITHUB_OUTPUT"
              echo "Reset validation: RUN (diff returned no changed files; defaulting to full coverage)." >> "$GITHUB_STEP_SUMMARY"
            elif printf '%s\n' "$changed" | grep -qE '^(supabase/|\.github/workflows/pr-validation\.yml)'; then
              echo "skip_reset=0" >> "$GITHUB_OUTPUT"
              echo "Reset validation: RUN (PR touches supabase/ or .github/workflows/pr-validation.yml)." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "skip_reset=1" >> "$GITHUB_OUTPUT"
              echo "Reset validation: SKIPPED (PR touches neither supabase/ nor .github/workflows/pr-validation.yml)." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            # push to main (post-merge trunk validation): always run the full suite.
            echo "skip_reset=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Supabase CLI
        if: steps.scope.outputs.skip_reset != '1'
        uses: supabase/setup-cli@v2
        with:
          version: latest
          # Authenticate the "resolve latest release" API call. Without this the
          # action hits the unauthenticated GitHub API limit (60/hr/IP), which
          # shared CI runners exhaust under high PR volume — failing the install
          # with "Failed to resolve latest Supabase CLI release: rate limit
          # exceeded" and reddening main. A token raises the limit to 1000/hr.
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run quote-gate conversion reset-path validation
        if: steps.scope.outputs.skip_reset != '1'
        run: bash supabase/tests/run_quote_conversion_require_quote_gate_reset.sh

