name: Mirror Temporal UI image

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'
  push:
    branches: [main]
    paths:
      - charts/app/values.yaml
      - .github/scripts/temporal-ui-image.sh
      - .github/workflows/mirror-temporal-ui-image.yml

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Mirror Temporal UI image into ACR
        env:
          REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}
          REGISTRY_USERNAME: ${{ secrets.ACR_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          SOURCE_REGISTRY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          SOURCE_REGISTRY_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          set -euo pipefail
          # Docker Hub auth is optional but strongly preferred here: without it,
          # Azure-hosted pulls can hit the anonymous 429 rate limit that caused #1183.
          bash ./.github/scripts/temporal-ui-image.sh mirror
