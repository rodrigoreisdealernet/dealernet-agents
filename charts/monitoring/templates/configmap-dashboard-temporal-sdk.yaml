apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring.fullname" . }}-dashboard-temporal-sdk
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
    {{ .Values.grafana.dashboardLabel }}: {{ .Values.grafana.dashboardLabelValue | quote }}
    wynne/dashboard-folder: temporal
data:
  temporal-sdk.json: |
    {
      "annotations": { "list": [] },
      "description": "Temporal SDK worker health — poll rates, task-queue depth, activity and workflow execution metrics from Python SDK workers.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Worker Poller Health",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 2,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(temporal_worker_task_slots_available{task_queue=~\"$task_queue\"}[5m])) by (task_queue, worker_type)",
              "legendFormat": "{{ "{{" }}worker_type{{ "}}" }} / {{ "{{" }}task_queue{{ "}}" }}"
            }
          ],
          "title": "Worker Task Slots Available",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 3,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(temporal_task_queue_poll_success_count{task_queue=~\"$task_queue\"}[5m])) by (task_queue)",
              "legendFormat": "{{ "{{" }}task_queue{{ "}}" }} success"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(temporal_task_queue_poll_empty_count{task_queue=~\"$task_queue\"}[5m])) by (task_queue)",
              "legendFormat": "{{ "{{" }}task_queue{{ "}}" }} empty"
            }
          ],
          "title": "Poll Rate (success vs empty)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 10,
          "title": "Workflow Execution (SDK)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 10 },
          "id": 11,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(temporal_workflow_completed_count{task_queue=~\"$task_queue\"}[5m])) by (task_queue)",
              "legendFormat": "{{ "{{" }}task_queue{{ "}}" }} completed"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(temporal_workflow_failed_count{task_queue=~\"$task_queue\"}[5m])) by (task_queue)",
              "legendFormat": "{{ "{{" }}task_queue{{ "}}" }} failed"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(temporal_workflow_canceled_count{task_queue=~\"$task_queue\"}[5m])) by (task_queue)",
              "legendFormat": "{{ "{{" }}task_queue{{ "}}" }} canceled"
            }
          ],
          "title": "Workflow Outcome Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "s" }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 10 },
          "id": 12,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum(rate(temporal_workflow_task_execution_latency_bucket{task_queue=~\"$task_queue\"}[5m])) by (le, task_queue))",
              "legendFormat": "p99 {{ "{{" }}task_queue{{ "}}" }}"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum(rate(temporal_workflow_task_execution_latency_bucket{task_queue=~\"$task_queue\"}[5m])) by (le, task_queue))",
              "legendFormat": "p50 {{ "{{" }}task_queue{{ "}}" }}"
            }
          ],
          "title": "Workflow Task Execution Latency",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 10 },
          "id": 13,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(temporal_workflow_failed_count{task_queue=~\"$task_queue\"}[5m]))",
              "legendFormat": "Workflow Failures/s"
            }
          ],
          "title": "Workflow Failure Rate",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 20,
          "title": "Activity Execution (SDK)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 19 },
          "id": 21,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(temporal_activity_execution_failed_count{task_queue=~\"$task_queue\"}[5m])) by (activity_type, task_queue)",
              "legendFormat": "{{ "{{" }}activity_type{{ "}}" }} failed"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(temporal_activity_execution_success_count{task_queue=~\"$task_queue\"}[5m])) by (activity_type, task_queue)",
              "legendFormat": "{{ "{{" }}activity_type{{ "}}" }} success"
            }
          ],
          "title": "Activity Outcome Rate by Type",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "s" }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 19 },
          "id": 22,
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum(rate(temporal_activity_execution_latency_bucket{task_queue=~\"$task_queue\"}[5m])) by (le, activity_type))",
              "legendFormat": "p99 {{ "{{" }}activity_type{{ "}}" }}"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum(rate(temporal_activity_execution_latency_bucket{task_queue=~\"$task_queue\"}[5m])) by (le, activity_type))",
              "legendFormat": "p50 {{ "{{" }}activity_type{{ "}}" }}"
            }
          ],
          "title": "Activity Execution Latency",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["temporal", "sdk", "worker"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": ".*", "value": ".*" },
            "hide": 0,
            "label": "Task Queue",
            "name": "task_queue",
            "options": [],
            "query": ".*",
            "type": "textbox"
          }
        ]
      },
      "time": { "from": "now-3h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Temporal SDK / Worker",
      "uid": "temporal-sdk",
      "version": 1
    }
