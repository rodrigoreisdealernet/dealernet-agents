# Production observability profile (namespace: dia-observability)
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 50Gi
  grafana:
    extraEnvFrom:
      - configMapRef:
          name: grafana-oidc-config
      - secretRef:
          name: "grafana-oidc-secrets-dia-prod"

targets:
  temporalServer:
    namespace: temporal
  temporalWorker:
    namespace: dia-prod
  opsApi:
    namespace: dia-prod

grafanaOidc:
  enabled: true
  issuerUrl: "https://keycloak.dia.example.com/realms/dia"
  redirectUrl: "https://grafana.dia.example.com/login/generic_oauth"
  secretName: "grafana-oidc-secrets-dia-prod"
