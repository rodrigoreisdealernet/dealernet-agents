# Test observability profile (namespace: dia-observability)
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 7d
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 10Gi
  grafana:
    extraEnvFrom:
      - configMapRef:
          name: grafana-oidc-config
      - secretRef:
          name: "grafana-oidc-secrets-dia-test"

targets:
  temporalServer:
    namespace: temporal
  temporalWorker:
    namespace: dia-test
  opsApi:
    namespace: dia-test

grafanaOidc:
  enabled: true
  issuerUrl: "https://keycloak.dia-test.example.com/realms/dia"
  redirectUrl: "https://grafana.dia-test.example.com/login/generic_oauth"
  secretName: "grafana-oidc-secrets-dia-test"
