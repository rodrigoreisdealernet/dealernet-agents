# Development profile for charts/app
# Intended namespace: wynne-dev (use: helm install/upgrade ... -n wynne-dev)
# Live on aks-selfheal-staging / wynne-dev. imageRegistry + image tags are set at
# deploy time (deploy-dev.yml --set ...); the rest reflects the validated live config.

frontend:
  replicaCount: 1
  image:
    repository: "frontend"
    tag: "dev-latest"
    # Digest is set at deploy time (deploy-dev.yml --set frontend.image.digest=sha256:...).
    # When a digest is available the image is pulled as repo@sha256:… ensuring the exact
    # built bits are deployed; the tag is kept for display/audit only.
    digest: ""
    pullPolicy: Always
  imagePullSecrets:
    - name: acr-pull
  # Browser-accessible dev: expose the frontend via a cloud LoadBalancer (own
  # public IP). The cluster has no nginx ingress class (Istio only), so this is
  # the simplest isolated entry point for nonprod testing.
  service:
    type: LoadBalancer
    port: 80
  ingress:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi      # Vite dev server is memory-hungry; 384Mi OOMKilled it
    limits:
      cpu: "1"
      memory: 1Gi
  env:
    # Browser traffic must use the public HTTPS Supabase endpoint so the app
    # avoids mixed-content blocking when served over HTTPS.
    supabaseUrl: "https://wynne-api-fvd0fcfubfb2drcy.a02.azurefd.net"
    apiUrl: "https://wynne-api-fvd0fcfubfb2drcy.a02.azurefd.net/functions/v1"
    # ops-api ClusterIP service reachable within the wynne-dev namespace.
    # nginx proxies /api/* to this backend so browser POSTs reach the FastAPI app.
    opsApiUrl: "http://rental-app-ops-api:8000"
  secrets:
    supabaseAnonKey:
      secretName: "frontend-secrets-wynne-dev"
      key: "VITE_SUPABASE_ANON_KEY"

temporalWorker:
  replicaCount: 1
  image:
    repository: "temporal-worker"
    tag: "dev-latest"
    # Digest is set at deploy time (deploy-dev.yml --set temporalWorker.image.digest=sha256:...).
    digest: ""
    pullPolicy: Always
  imagePullSecrets:
    - name: acr-pull
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi
  temporal:
    # Points at the Temporal frontend Service in the `dev` namespace
    # (temporal-frontend.dev.svc.cluster.local). There is no `temporal` namespace
    # in this cluster; using that hostname causes DNS failures and worker crashloops.
    address: "temporal-frontend.dev.svc.cluster.local:7233"
    namespace: "default"
    taskQueue: "wynne-dev-main"
  supabase:
    # Worker runs in-cluster → use the internal Kong service (service-role calls).
    url: "http://supabase-supabase-kong.wynne-supabase.svc.cluster.local"
  secrets:
    supabaseServiceRoleKey:
      secretName: "temporal-worker-secrets-wynne-dev"
      key: "SUPABASE_SERVICE_ROLE_KEY"

opsApi:
  replicaCount: 1
  image:
    repository: "temporal-worker"
    tag: "dev-latest"
    # Digest is set at deploy time (deploy-dev.yml --set opsApi.image.digest=sha256:...).
    digest: ""
    pullPolicy: Always
  imagePullSecrets:
    - name: acr-pull
  temporal:
    address: "temporal-frontend.dev.svc.cluster.local:7233"
    namespace: "default"
  supabase:
    url: "http://supabase-supabase-kong.wynne-supabase.svc.cluster.local"
  secrets:
    supabaseServiceRoleKey:
      secretName: "temporal-worker-secrets-wynne-dev"
      key: "SUPABASE_SERVICE_ROLE_KEY"

# ---------------------------------------------------------------------------
# In-cluster Temporal Web UI (internal-only; access via port-forward)
# ---------------------------------------------------------------------------
# Re-enabled by #1183: the chart now mounts a writable config emptyDir at
# /home/ui-server/config, and CI validates that temporalio/ui:<tag> is already
# mirrored into ACR before a chart tag bump can merge.
#   kubectl -n wynne-dev port-forward svc/rental-app-temporal-ui 8080:8080
#   then open http://localhost:8080
temporalUi:
  enabled: true
  imagePullSecrets:
    - name: acr-pull
  temporalGrpcAddress: "temporal-frontend.dev.svc.cluster.local:7233"
  temporalDefaultNamespace: "default"

# ---------------------------------------------------------------------------
# Observability (Prometheus + Grafana)
# ---------------------------------------------------------------------------
# Service monitors and alert rules are enabled when kube-prometheus-stack is
# installed in the cluster. Set observability.serviceMonitor.additionalLabels
# to match your Prometheus release selector (e.g. release: kube-prometheus-stack).
observability:
  enabled: true
  serviceMonitor:
    enabled: false   # Enable once kube-prometheus-stack is deployed in dev
    additionalLabels: {}
  prometheusRule:
    enabled: false   # Enable once kube-prometheus-stack is deployed in dev
    additionalLabels: {}
  grafana:
    dashboards:
      enabled: false # Enable once Grafana sidecar is deployed in dev

# ---------------------------------------------------------------------------
# External Secrets Operator — dev (wynne-dev)
# ---------------------------------------------------------------------------
# Set enabled: true once ESO + a SecretStore named openbao-dev
# are installed in the cluster.  The OpenBao paths/fields below must be
# provisioned in the target OpenBao instance before enabling.
#
# Intermediate state: acr-pull is ESO-delivered (scoped token, not admin creds).
# Target state: remove acr-pull imagePullSecrets when AKS kubelet managed
# identity is granted ACR pull access (per ADR-0100).
# OpenBao KV-v2 layout (store mount "secret"): runtime app secrets share the path
# wynne/dev/runtime; the scoped ACR pull token lives at wynne/dev/acr-pull.
externalSecrets:
  enabled: false
  refreshInterval: "1h"
  secretStore:
    name: "openbao-dev"
    # Namespaced SecretStore (bootstrapped at deploy/k8s/wynne-dev/secretstore-openbao.yaml)
    # — fits the namespace-scoped gha-deployer. Verified end-to-end against ESO v2.6.0.
    kind: "SecretStore"
  keys:
    supabaseAnonKey: "wynne/dev/runtime"
    supabaseServiceRoleKey: "wynne/dev/runtime"
    # Scoped ACR pull token (replaces admin-credential acr-pull secret).
    # Set to the OpenBao path that holds the .dockerconfigjson for the
    # scoped token once provisioned; leave empty to create acr-pull manually.
    acrPullDockerConfig: "wynne/dev/acr-pull"
    oauth2ProxyClientId: ""
    oauth2ProxyClientSecret: ""
    oauth2ProxyCookieSecret: ""
  properties:
    supabaseAnonKey: "anon-key"
    supabaseServiceRoleKey: "service-role-key"
    acrPullDockerConfig: "dockerconfigjson"
    oauth2ProxyClientId: ""
    oauth2ProxyClientSecret: ""
    oauth2ProxyCookieSecret: ""
