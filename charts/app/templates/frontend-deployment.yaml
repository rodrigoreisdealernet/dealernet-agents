apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.frontend.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "app.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.frontend.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- with .Values.frontend.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.frontend.podSecurityContext | nindent 8 }}
      containers:
        - name: frontend
          image: {{ include "app.image" (dict "image" .Values.frontend.image "global" .Values.imageRegistry) }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.frontend.securityContext | nindent 12 }}
          volumeMounts:
            - name: frontend-tmp
              mountPath: /tmp
            - name: frontend-cache
              mountPath: /var/cache/nginx
            - name: frontend-run
              mountPath: /var/run
            - name: frontend-nginx-conf
              mountPath: /etc/nginx/conf.d
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: VITE_SUPABASE_URL
              value: {{ .Values.frontend.env.supabaseUrl | quote }}
            - name: VITE_API_URL
              value: {{ .Values.frontend.env.apiUrl | quote }}
            - name: OPS_API_URL
              value: {{ .Values.frontend.env.opsApiUrl | quote }}
            - name: VITE_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.frontend.secrets.supabaseAnonKey.secretName | quote }}
                  key: {{ .Values.frontend.secrets.supabaseAnonKey.key | quote }}
          livenessProbe:
            {{- toYaml .Values.frontend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.frontend.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      volumes:
        - name: frontend-tmp
          emptyDir: {}
        - name: frontend-cache
          emptyDir: {}
        - name: frontend-run
          emptyDir: {}
        - name: frontend-nginx-conf
          emptyDir: {}
