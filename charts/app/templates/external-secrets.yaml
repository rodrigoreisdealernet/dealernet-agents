{{/*
External Secrets Operator integration.

When externalSecrets.enabled is true, this template renders ExternalSecret resources that
sync secrets from the configured store (OpenBao / HashiCorp Vault API, via the ESO "vault"
provider) into namespace-scoped Kubernetes Secret objects.  The Deployment secretKeyRef
references remain unchanged — ESO-delivered secrets are identical in name and key structure
to manually created ones (backward compatible).

The store provider is opaque to this chart: remoteRef.key plus the optional
remoteRef.property (externalSecrets.properties.*) are passed through verbatim, so the same
template works for flat stores (key only) and for OpenBao KV-v2 grouped maps
(key = secret path, property = field within the map at that path).

Prerequisites (see charts/app/README.md and docs/runbooks/secret-operations.md):
  - External Secrets Operator installed in the cluster.
  - A ClusterSecretStore or SecretStore named externalSecrets.secretStore.name that
    authenticates ESO against the target OpenBao instance (provider: vault).
  - Secrets provisioned at the paths declared in externalSecrets.keys.* (and, for KV-v2
    grouped maps, the fields declared in externalSecrets.properties.*) for each environment.

API version: uses external-secrets.io/v1, which ESO v2.x serves.  ESO v2.x dropped
v1beta1; v1 is the stable API surface.  The chart requires ESO v2.x or later — if an older
version is installed, helm lint will succeed but the CRD will not be present and apply will
fail with an "unknown kind: ExternalSecret" error, which is the appropriate failure mode.
A .Capabilities check is intentionally omitted: externalSecrets.enabled is false by default
so the template renders nothing without explicit opt-in, and capability detection for CRDs
is unreliable at template time (depends on an up-to-date API discovery cache).

When externalSecrets.enabled is false (default) no ExternalSecret resources are rendered
and secrets must be created manually as documented in charts/app/README.md.
*/}}

{{- if .Values.externalSecrets.enabled }}

{{/* ── Frontend secrets ────────────────────────────────────────────────────── */}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "app.frontend.fullname" . }}-eso
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-secret
  annotations:
    app.kubernetes.io/managed-by-eso: "true"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name | quote }}
    kind: {{ .Values.externalSecrets.secretStore.kind | quote }}
  target:
    name: {{ .Values.frontend.secrets.supabaseAnonKey.secretName | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.frontend.secrets.supabaseAnonKey.key | quote }}
      remoteRef:
        key: {{ .Values.externalSecrets.keys.supabaseAnonKey | quote }}
        {{- with .Values.externalSecrets.properties.supabaseAnonKey }}
        property: {{ . | quote }}
        {{- end }}

{{/* ── Temporal-worker + ops-api secrets ──────────────────────────────────── */}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "app.temporalWorker.fullname" . }}-eso
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-secret
  annotations:
    app.kubernetes.io/managed-by-eso: "true"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name | quote }}
    kind: {{ .Values.externalSecrets.secretStore.kind | quote }}
  target:
    name: {{ .Values.temporalWorker.secrets.supabaseServiceRoleKey.secretName | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.temporalWorker.secrets.supabaseServiceRoleKey.key | quote }}
      remoteRef:
        key: {{ .Values.externalSecrets.keys.supabaseServiceRoleKey | quote }}
        {{- with .Values.externalSecrets.properties.supabaseServiceRoleKey }}
        property: {{ . | quote }}
        {{- end }}

{{/* ── ACR pull secret (intermediate step: scoped token from OpenBao) ─────── */}}
{{/*    Target state: remove imagePullSecrets and rely on AKS managed identity  */}}
{{- if .Values.externalSecrets.keys.acrPullDockerConfig }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "app.fullname" . }}-acr-pull-eso
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-secret
  annotations:
    app.kubernetes.io/managed-by-eso: "true"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name | quote }}
    kind: {{ .Values.externalSecrets.secretStore.kind | quote }}
  target:
    name: "acr-pull"
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ `{{ .dockerconfigjson }}` }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: {{ .Values.externalSecrets.keys.acrPullDockerConfig | quote }}
        {{- with .Values.externalSecrets.properties.acrPullDockerConfig }}
        property: {{ . | quote }}
        {{- end }}
{{- end }}

{{/* ── oauth2-proxy secrets (admin access boundary) ───────────────────────── */}}
{{/*    All three keys must be non-empty; partial config produces remoteRef.key=""  */}}
{{- if and .Values.adminAccess.enabled .Values.adminAccess.oauth2Proxy.enabled .Values.externalSecrets.keys.oauth2ProxyClientId .Values.externalSecrets.keys.oauth2ProxyClientSecret .Values.externalSecrets.keys.oauth2ProxyCookieSecret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "app.oauth2Proxy.fullname" . }}-eso
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-secret
  annotations:
    app.kubernetes.io/managed-by-eso: "true"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name | quote }}
    kind: {{ .Values.externalSecrets.secretStore.kind | quote }}
  target:
    name: {{ .Values.adminAccess.oauth2Proxy.secrets.clientId.secretName | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.adminAccess.oauth2Proxy.secrets.clientId.key | quote }}
      remoteRef:
        key: {{ .Values.externalSecrets.keys.oauth2ProxyClientId | quote }}
        {{- with .Values.externalSecrets.properties.oauth2ProxyClientId }}
        property: {{ . | quote }}
        {{- end }}
    - secretKey: {{ .Values.adminAccess.oauth2Proxy.secrets.clientSecret.key | quote }}
      remoteRef:
        key: {{ .Values.externalSecrets.keys.oauth2ProxyClientSecret | quote }}
        {{- with .Values.externalSecrets.properties.oauth2ProxyClientSecret }}
        property: {{ . | quote }}
        {{- end }}
    - secretKey: {{ .Values.adminAccess.oauth2Proxy.secrets.cookieSecret.key | quote }}
      remoteRef:
        key: {{ .Values.externalSecrets.keys.oauth2ProxyCookieSecret | quote }}
        {{- with .Values.externalSecrets.properties.oauth2ProxyCookieSecret }}
        property: {{ . | quote }}
        {{- end }}
{{- end }}

{{- end }}{{/* externalSecrets.enabled */}}
