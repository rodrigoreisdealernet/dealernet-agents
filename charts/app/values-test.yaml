# Test profile for charts/app
# Intended namespace: dia-test (use: helm install/upgrade ... -n dia-test)

frontend:
  replicaCount: 2
  image:
    repository: "frontend"
    # Replace <git-sha> during deployment automation; digest is set at deploy time.
    tag: "test-<git-sha>"
    digest: ""
    pullPolicy: IfNotPresent
  imagePullSecrets:
    - name: acr-pull
  # Cluster is Istio-only (no nginx ingress class) — expose via LoadBalancer like dev,
  # fronted publicly by the dia-app-test Azure Front Door endpoint.
  service:
    type: LoadBalancer
    port: 80
  ingress:
    enabled: false
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    # Browser → Supabase through the dia-api-test Front Door endpoint (HTTPS; avoids
    # mixed-content when the app itself is served over HTTPS). The Kong origin must stay
    # Front-Door-restricted (no arbitrary direct-origin access).
    supabaseUrl: "https://dia-api-test-h5hbdeb8b9fdhedu.a02.azurefd.net"
    apiUrl: "https://dia-api-test-h5hbdeb8b9fdhedu.a02.azurefd.net/functions/v1"
    opsApiUrl: "http://rental-app-ops-api:8000"
  secrets:
    supabaseAnonKey:
      secretName: "frontend-secrets-dia-test"
      key: "VITE_SUPABASE_ANON_KEY"

temporalWorker:
  # 0 until an in-cluster Temporal server exists for UAT (same posture as dev). Scale up
  # once Temporal is provisioned.
  replicaCount: 0
  image:
    repository: "temporal-worker"
    tag: "test-<git-sha>"
    digest: ""
    pullPolicy: IfNotPresent
  imagePullSecrets:
    - name: acr-pull
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  temporal:
    address: "temporal-frontend.temporal.svc.cluster.local:7233"
    namespace: "dia-test"
    taskQueue: "dia-test-main"
  supabase:
    url: "http://supabase-supabase-kong.dia-supabase-test.svc.cluster.local"
  secrets:
    supabaseServiceRoleKey:
      secretName: "temporal-worker-secrets-dia-test"
      key: "SUPABASE_SERVICE_ROLE_KEY"

opsApi:
  replicaCount: 1
  image:
    repository: "temporal-worker"
    tag: "test-<git-sha>"
    digest: ""
    pullPolicy: IfNotPresent
  imagePullSecrets:
    - name: acr-pull
  temporal:
    address: "temporal-frontend.temporal.svc.cluster.local:7233"
    namespace: "dia-test"
  supabase:
    url: "http://supabase-supabase-kong.dia-supabase-test.svc.cluster.local"
  secrets:
    supabaseServiceRoleKey:
      secretName: "temporal-worker-secrets-dia-test"
      key: "SUPABASE_SERVICE_ROLE_KEY"

alerting:
  enabled: false   # PrometheusRule CRD + alert-bridge endpoint not provisioned for UAT
  prometheusRule:
    additionalLabels:
      release: kube-prometheus-stack
  alertmanagerConfig:
    incidentBridge:
      # Set to the deployed incident bridge endpoint; update before enabling.
      webhookUrl: ""
      bearerTokenSecretName: "alert-bridge-secrets-dia-test"
      bearerTokenSecretKey: "ALERT_BRIDGE_TOKEN"

adminAccess:
  enabled: false   # Keycloak/OIDC + oauth2-proxy + studio/grafana/prom/alertmanager admin surfaces not provisioned for UAT
  oauth2Proxy:
    enabled: true
    oidc:
      issuerUrl: "https://keycloak.dia-test.example.com/realms/dia"
      # Must match temporalUi.ingress.hosts[*].host + /oauth2/callback for this env.
      redirectUrl: "https://temporal.dia-test.example.com/oauth2/callback"
      groupsClaim: "groups"
      adminGroup: "admin"
    secrets:
      clientId:
        secretName: "oauth2-proxy-secrets-dia-test"
        key: "OAUTH2_PROXY_CLIENT_ID"
      clientSecret:
        secretName: "oauth2-proxy-secrets-dia-test"
        key: "OAUTH2_PROXY_CLIENT_SECRET"
      cookieSecret:
        secretName: "oauth2-proxy-secrets-dia-test"
        key: "OAUTH2_PROXY_COOKIE_SECRET"
  temporalUi:
    enabled: true
    # Point to the in-namespace Temporal UI service deployed by temporalUi.enabled below.
    upstreamHost: "rental-app-temporal-ui.dia-test.svc.cluster.local"
    upstreamPort: 8080
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: temporal.dia-test.example.com
          paths:
            - path: /
              pathType: Prefix
  grafana:
    enabled: true
    # kube-prometheus-stack is deployed as Helm release "observability" in the
    # dia-observability namespace (charts/observability, PR #789).
    upstreamHost: "observability-grafana.dia-observability.svc.cluster.local"
    upstreamPort: 80
    nativeOidc:
      enabled: true
      issuerUrl: "https://keycloak.dia-test.example.com/realms/dia"
      # Must match grafana.ingress.hosts[*].host + /login/generic_oauth for this env.
      redirectUrl: "https://grafana.dia-test.example.com/login/generic_oauth"
      secrets:
        clientId:
          secretName: "grafana-oidc-secrets-dia-test"
          key: "GF_AUTH_GENERIC_OAUTH_CLIENT_ID"
        clientSecret:
          secretName: "grafana-oidc-secrets-dia-test"
          key: "GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET"
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: grafana.dia-test.example.com
          paths:
            - path: /
              pathType: Prefix
  studio:
    enabled: true
    upstreamHost: "supabase-supabase-studio.dia-supabase.svc.cluster.local"
    upstreamPort: 3000
    oauth2Proxy:
      enabled: true
      # Must match studio.ingress.hosts[*].host + /oauth2/callback for this env.
      redirectUrl: "https://studio.dia-test.example.com/oauth2/callback"
      secrets:
        clientId:
          secretName: "oauth2-proxy-studio-secrets-dia-test"
          key: "OAUTH2_PROXY_CLIENT_ID"
        clientSecret:
          secretName: "oauth2-proxy-studio-secrets-dia-test"
          key: "OAUTH2_PROXY_CLIENT_SECRET"
        cookieSecret:
          secretName: "oauth2-proxy-studio-secrets-dia-test"
          key: "OAUTH2_PROXY_COOKIE_SECRET"
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: studio.dia-test.example.com
          paths:
            - path: /
              pathType: Prefix
  prometheus:
    enabled: true
    upstreamHost: "observability-kube-prometheus-stack-prometheus.dia-observability.svc.cluster.local"
    upstreamPort: 9090
    oauth2Proxy:
      enabled: true
      # Must match prometheus.ingress.hosts[*].host + /oauth2/callback for this env.
      redirectUrl: "https://prometheus.dia-test.example.com/oauth2/callback"
      secrets:
        clientId:
          secretName: "oauth2-proxy-prometheus-secrets-dia-test"
          key: "OAUTH2_PROXY_CLIENT_ID"
        clientSecret:
          secretName: "oauth2-proxy-prometheus-secrets-dia-test"
          key: "OAUTH2_PROXY_CLIENT_SECRET"
        cookieSecret:
          secretName: "oauth2-proxy-prometheus-secrets-dia-test"
          key: "OAUTH2_PROXY_COOKIE_SECRET"
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: prometheus.dia-test.example.com
          paths:
            - path: /
              pathType: Prefix
  alertmanager:
    enabled: true
    upstreamHost: "observability-kube-prometheus-stack-alertmanager.dia-observability.svc.cluster.local"
    upstreamPort: 9093
    oauth2Proxy:
      enabled: true
      # Must match alertmanager.ingress.hosts[*].host + /oauth2/callback for this env.
      redirectUrl: "https://alertmanager.dia-test.example.com/oauth2/callback"
      secrets:
        clientId:
          secretName: "oauth2-proxy-alertmanager-secrets-dia-test"
          key: "OAUTH2_PROXY_CLIENT_ID"
        clientSecret:
          secretName: "oauth2-proxy-alertmanager-secrets-dia-test"
          key: "OAUTH2_PROXY_CLIENT_SECRET"
        cookieSecret:
          secretName: "oauth2-proxy-alertmanager-secrets-dia-test"
          key: "OAUTH2_PROXY_COOKIE_SECRET"
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: alertmanager.dia-test.example.com
          paths:
            - path: /
              pathType: Prefix

# ---------------------------------------------------------------------------
# In-cluster Temporal Web UI
# ---------------------------------------------------------------------------
temporalUi:
  enabled: false   # no in-cluster Temporal server for UAT yet
  temporalGrpcAddress: "temporal-frontend.temporal.svc.cluster.local:7233"
  temporalDefaultNamespace: "dia-test"

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
observability:
  enabled: true
  serviceMonitor:
    enabled: false   # kube-prometheus-stack CRDs not deployed for UAT
    additionalLabels:
      release: observability
  prometheusRule:
    enabled: false   # kube-prometheus-stack CRDs not deployed for UAT
    additionalLabels:
      release: observability
  grafana:
    dashboards:
      enabled: false

# ---------------------------------------------------------------------------
# External Secrets Operator — test (dia-test)
# ---------------------------------------------------------------------------
externalSecrets:
  enabled: false
  refreshInterval: "1h"
  secretStore:
    name: "openbao-test"
    kind: "ClusterSecretStore"
  keys:
    supabaseAnonKey: "dia/test/runtime"
    supabaseServiceRoleKey: "dia/test/runtime"
    acrPullDockerConfig: ""
    oauth2ProxyClientId: "dia/test/oauth2-proxy"
    oauth2ProxyClientSecret: "dia/test/oauth2-proxy"
    oauth2ProxyCookieSecret: "dia/test/oauth2-proxy"
  properties:
    supabaseAnonKey: "anon-key"
    supabaseServiceRoleKey: "service-role-key"
    acrPullDockerConfig: ""
    oauth2ProxyClientId: "client-id"
    oauth2ProxyClientSecret: "client-secret"
    oauth2ProxyCookieSecret: "cookie-secret"
